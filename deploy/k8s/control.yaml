# RustPBX Control Plane.
#
# Runs as a StatefulSet so each replica has a stable identity + its own PVC —
# required when scaling Raft beyond one voter. With replicas: 1 the node runs
# a single-voter Raft cluster (fully functional, no HA). See README for the
# add-learner / change-membership flow to scale to 3.
#
# The admin SPA is embedded in the binary (rust-embed), so no web volume is
# needed — /healthz and the console are both served on http_addr (9080).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rustpbx-control-config
  labels:
    app.kubernetes.io/name: rustpbx-control
data:
  config.toml: |
    grpc_addr = "0.0.0.0:9090"
    http_addr = "0.0.0.0:9080"
    # SQLite on the PVC (out-of-the-box). For HA use an external Postgres/MySQL
    # and set the same database_url on every replica.
    database_url = "sqlite:///app/data/control.sqlite3?mode=rwc"
    base_domain = "pbx.example.com"      # default tenant domains: <tenantId>.<base_domain>
    call_slot_ttl_secs = 14400           # 4h leak backstop for per-tenant call slots
    log = "info"

    # CHANGE THESE. Prefer mounting admin_password from a Secret in production.
    admin_username = "admin"
    admin_password = "changeme"

    # Single-node Raft by default (no [raft] block). To cluster, add per-replica:
    #   [raft]
    #   node_id = <unique>            # 1, 2, 3 …
    #   addr = "0.0.0.0:9091"         # Raft transport listen port
    #   advertise_addr = "<podDNS>:9091"
    # then join peers via POST /api/raft/add-learner + /change-membership.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustpbx-control
  labels:
    app.kubernetes.io/name: rustpbx-control
spec:
  serviceName: rustpbx-control
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustpbx-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustpbx-control
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: control
          image: rustpbx-control:latest
          args: ["/app/config.toml"]
          ports:
            - name: http
              containerPort: 9080
            - name: grpc
              containerPort: 9090
          env:
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
              readOnly: true
            - name: data
              mountPath: /app/data
          # The SPA console + /healthz are on http_addr; /readyz flips ready
          # once the node has bootstrapped. No in-image curl needed — kubelet
          # performs the HTTP probe itself.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: rustpbx-control-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rustpbx-control
  labels:
    app.kubernetes.io/name: rustpbx-control
spec:
  selector:
    app.kubernetes.io/name: rustpbx-control
  ports:
    - name: http
      port: 9080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
