syntax = "proto3";

package rustpbx.control;

service ControlPlane {
  // ── Config pull ──────────────────────────────────────────────────────────
  rpc GetTrunkConfigs(GetTrunkConfigsRequest) returns (TrunkConfigList);
  rpc GetRouteRules(GetRouteRulesRequest)     returns (RouteRuleList);
  rpc GetAclRules(GetAclRulesRequest)         returns (AclRuleList);

  // ── Config push (server-streaming) ───────────────────────────────────────
  rpc WatchConfigChanges(WatchRequest) returns (stream ConfigChangeEvent);

  // ── CDR ───────────────────────────────────────────────────────────────────
  rpc ReportCallRecord(CallRecordReport) returns (ReportAck);

  // ── Worker lifecycle ──────────────────────────────────────────────────────
  rpc RegisterWorker(WorkerInfo)        returns (RegisterAck);
  rpc WorkerHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // ── Edge lifecycle (observability) ────────────────────────────────────────
  // Edges aren't load-selected by the control plane (carriers reach them by
  // fixed IP/DNS); registering is purely so the admin console can see which
  // edges are alive, their address/version, and health.
  rpc RegisterEdge(EdgeInfo)            returns (RegisterAck);
  rpc EdgeHeartbeat(EdgeHeartbeatRequest) returns (HeartbeatResponse);

  // ── Worker discovery ──────────────────────────────────────────────────────
  rpc GetAvailableWorkers(GetWorkersRequest) returns (WorkerList);

  // ── Internal: write-forwarding ────────────────────────────────────────────
  // A follower that receives a registry mutation forwards the serialized
  // RegistryCommand here, to the current Raft leader, which applies it.
  rpc ProposeWrite(ProposeWriteRequest) returns (ProposeWriteResponse);
}

message ProposeWriteRequest {
  // JSON-serialized raft::types::RegistryCommand.
  bytes command = 1;
}
message ProposeWriteResponse {
  bool known = 1;
  uint32 removed = 2;
}

// ─── Trunk ───────────────────────────────────────────────────────────────────

message GetTrunkConfigsRequest {
  optional int64  tenant_id = 1;
  optional string edge_id   = 2;
}

message TrunkConfigProto {
  string          name      = 1;
  optional int64  id        = 2;
  optional int64  tenant_id = 3;

  string          dest        = 4;
  optional string backup_dest = 5;
  optional string transport   = 6;
  optional string direction   = 7;
  repeated string inbound_hosts = 8;
  repeated string did_numbers   = 9;

  optional string username = 10;
  optional string password = 11;

  repeated string codec = 12;

  optional bool   disabled  = 13;
  optional uint32 max_calls = 14;
  optional uint32 max_cps   = 15;
  optional uint32 weight    = 16;

  optional bool   register_enabled = 17;
  optional uint32 register_expires = 18;
  map<string, string> register_extra_headers = 19;

  optional bool   rewrite_hostport          = 20;
  optional string incoming_from_user_prefix = 21;
  optional string incoming_to_user_prefix   = 22;
  optional string country                   = 23;
  optional string sbc_metadata_json         = 24;
}

message TrunkConfigList {
  repeated TrunkConfigProto trunks = 1;
  uint64 version = 2;
}

// ─── Routes ──────────────────────────────────────────────────────────────────

message GetRouteRulesRequest {
  optional int64 tenant_id = 1;
}

message MatchConditionsProto {
  optional string from_user        = 1;
  optional string from_host        = 2;
  optional string to_user          = 3;
  optional string to_host          = 4;
  optional string to_port          = 5;
  optional string request_uri_user = 6;
  optional string request_uri_host = 7;
  optional string request_uri_port = 8;
  map<string, string> headers      = 9;
  optional string from   = 10;
  optional string to     = 11;
  optional string caller = 12;
  optional string callee = 13;
}

message RewriteRulesProto {
  optional string from_user        = 1;
  optional string from_host        = 2;
  optional string to_user          = 3;
  optional string to_host          = 4;
  optional string to_port          = 5;
  optional string request_uri_user = 6;
  optional string request_uri_host = 7;
  optional string request_uri_port = 8;
  map<string, string> headers      = 9;
}

message RouteActionProto {
  optional string action          = 1;
  repeated string dest            = 2;
  string          select          = 3;
  optional string hash_key        = 4;
  optional string queue           = 5;
  optional string app             = 6;
  optional string app_params_json = 7;
  bool            auto_answer     = 8;
  optional uint32 reject_code     = 9;
  optional string reject_reason   = 10;
}

message RouteRuleProto {
  string          name                   = 1;
  optional string description            = 2;
  int32           priority               = 3;
  string          direction              = 4;
  repeated string source_trunks         = 5;
  repeated int64  source_trunk_ids      = 6;
  optional int64  tenant_id             = 7;
  MatchConditionsProto   match_conditions = 8;
  optional RewriteRulesProto rewrite      = 9;
  RouteActionProto           action       = 10;
  repeated string codecs                 = 11;
  optional bool   disable_ice_servers    = 12;
  optional bool   disabled               = 13;
}

message RouteRuleList {
  repeated RouteRuleProto rules = 1;
  uint64 version = 2;
}

// ─── ACL ─────────────────────────────────────────────────────────────────────

message GetAclRulesRequest {
  optional int64 tenant_id = 1;
}

message AclRuleList {
  repeated string rules = 1;
  uint64 version = 2;
}

// ─── Config push ─────────────────────────────────────────────────────────────

message WatchRequest {
  optional string edge_id   = 1;
  optional string worker_id = 2;
  uint64 from_version       = 3;
}

message ConfigChangeEvent {
  enum ChangeType {
    TRUNK_ADDED   = 0;
    TRUNK_UPDATED = 1;
    TRUNK_REMOVED = 2;
    ROUTE_CHANGED = 3;
    ACL_CHANGED   = 4;
  }
  ChangeType change_type          = 1;
  optional string name            = 2;
  optional TrunkConfigProto trunk = 3;
  uint64 version                  = 4;
}

// ─── CDR ─────────────────────────────────────────────────────────────────────

message CallRecordReport {
  string  call_id              = 1;
  optional int64 tenant_id     = 2;
  string  caller               = 3;
  string  callee               = 4;
  string  direction            = 5;
  string  status               = 6;
  int64   start_time_unix_ms   = 7;
  int64   answer_time_unix_ms  = 8;
  int64   end_time_unix_ms     = 9;
  int32   duration_secs        = 10;
  optional string trunk_name   = 11;
  optional string worker_id    = 12;
  optional string edge_id      = 13;
  optional string recording_path = 14;
  map<string, string> metadata = 15;
  optional uint32 hangup_cause = 16;
}

message ReportAck { bool accepted = 1; }

// ─── Worker lifecycle ─────────────────────────────────────────────────────────

message WorkerInfo {
  string worker_id       = 1;
  string sip_addr        = 2;
  string rtp_external_ip = 3;
  uint32 rtp_start_port  = 4;
  uint32 rtp_end_port    = 5;
  uint32 max_concurrent  = 6;
  uint32 active_calls    = 7;
  map<string, string> labels = 8;
  // EdgeWorker gRPC address (host:port) for AllocateCall. Empty if the worker
  // doesn't serve AllocateCall (Edge then selects without reservation).
  string edge_worker_addr = 9;
  // Detected NAT type (open/cone/symmetric/nat/blocked/unknown), from STUN.
  string nat_type = 10;
}

message RegisterAck    { bool accepted = 1; }
message HeartbeatRequest {
  string worker_id      = 1;
  uint32 active_calls   = 2;
  float  cpu_usage      = 3;
  uint32 rtp_ports_used = 4;
}
message HeartbeatResponse  { bool drain = 1; }
message GetWorkersRequest  { optional int64 tenant_id = 1; }
message WorkerList         { repeated WorkerInfo workers = 1; }

// ─── Edge lifecycle ────────────────────────────────────────────────────────────

message EdgeInfo {
  string edge_id          = 1;
  string public_ip        = 2;   // fixed public IP advertised to carriers
  string sip_addr         = 3;   // e.g. "1.2.3.4:5060"
  repeated string transports = 4; // udp / tcp / tls
  string region           = 5;
  string version          = 6;
  uint32 active_calls     = 7;   // in-flight proxied dialogs (best-effort)
  string nat_type         = 8;   // detected NAT type (STUN), see WorkerInfo
}
message EdgeHeartbeatRequest {
  string edge_id      = 1;
  uint32 active_calls = 2;
}
