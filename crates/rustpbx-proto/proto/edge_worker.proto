syntax = "proto3";

package rustpbx.edge;

// Edge ↔ Worker signaling for call allocation.
// Actual call media/signaling uses internal SIP between Edge and Worker.
// This gRPC service handles the control-plane aspects of call dispatch.

service EdgeWorker {
  // Edge asks Worker to prepare for an incoming call.
  // Worker reserves resources and returns its internal SIP contact.
  rpc AllocateCall(AllocateCallRequest) returns (AllocateCallResponse);

  // Worker notifies Edge of call state changes.
  // (Can also be done via SIP BYE/NOTIFY, this is an optional control channel.)
  rpc CallStateUpdate(CallStateEvent) returns (CallStateAck);
}

// ─── Messages ────────────────────────────────────────────────

message AllocateCallRequest {
  string call_id            = 1;
  int64  tenant_id          = 2;
  string trunk_name         = 3;
  string caller             = 4;
  string callee             = 5;
  string direction          = 6;  // "inbound" | "outbound"
  map<string, string> custom_headers = 7;
}

message AllocateCallResponse {
  bool   accepted           = 1;
  string worker_sip_contact = 2;  // sip:worker-ip:port where Edge sends INVITE
  optional string reject_reason = 3;
}

message CallStateEvent {
  string call_id        = 1;
  string worker_id      = 2;
  CallState state       = 3;
  optional uint32 hangup_cause = 4;
  optional string reason = 5;
}

enum CallState {
  RINGING     = 0;
  ANSWERED    = 1;
  COMPLETED   = 2;
  FAILED      = 3;
  TRANSFERRED = 4;
}

message CallStateAck {
  bool received = 1;
}
